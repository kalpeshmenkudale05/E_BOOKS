<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Book Store | Feedback</title>
    <link rel="stylesheet" href="feedback.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">

        <div class="logo">
            GK
        </div>

        <img src="feedback.png" alt="Feedback Illustration" class="feedback-img">

        <h1>Feedback Form</h1>
        <p>We'd love to hear your thoughts!</p>

    </div>

    <form>

        <div class="input-box">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Rate Your Experience</label>
            <select required>
                <option value="">Select Rating</option>
                <option>⭐⭐⭐⭐⭐ Excellent</option>
                <option>⭐⭐⭐⭐ Good</option>
                <option>⭐⭐⭐ Average</option>
                <option>⭐⭐ Poor</option>
                <option>⭐ Very Poor</option>
            </select>
        </div>

        <div class="input-box">
            <label>Your Feedback</label>
            <textarea rows="6" placeholder="Write your feedback here..." required></textarea>
        </div>

        <button type="submit">Submit Feedback</button>

        <div class="back">
            <a href="index.html">← Back to Home Page</a>
        </div>

    </form>

</div>

</body>
</html>
